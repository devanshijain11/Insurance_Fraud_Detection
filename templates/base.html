<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Insurance Fraud Detection{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050a0f;
            --bg-mid: #0a1520;
            --bg-card: rgba(10, 25, 45, 0.7);
            --accent: #00e5ff;
            --accent2: #ff3d71;
            --accent3: #a8ff78;
            --text: #e8f4fd;
            --text-dim: #7a9bb5;
            --border: rgba(0, 229, 255, 0.15);
            --glow: rgba(0, 229, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg-deep);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(0,229,255,0.04) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(255,61,113,0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: drift 20s ease-in-out infinite alternate;
        }

        @keyframes drift {
            from { transform: translate(0, 0); }
            to { transform: translate(30px, -20px); }
        }

        /* NAVBAR */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 64px;
            background: rgba(5, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .navbar-brand {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 18px;
            letter-spacing: 0.05em;
            color: var(--accent);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar-brand::before {
            content: '◈';
            font-size: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .navbar-links {
            display: flex;
            gap: 4px;
            list-style: none;
        }

        .navbar-links a {
            display: block;
            padding: 6px 14px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border-radius: 4px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .navbar-links a:hover {
            color: var(--accent);
            border-color: var(--border);
            background: var(--glow);
        }

        .navbar-links a.active {
            color: var(--accent);
            background: rgba(0, 229, 255, 0.1);
            border-color: var(--border);
        }

        /* PAGE WRAPPER */
        .page-wrapper {
            position: relative;
            z-index: 1;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* CARDS */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            backdrop-filter: blur(20px);
            padding: 28px;
        }

        .card-header {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-header::before {
            content: '';
            display: block;
            width: 3px;
            height: 14px;
            background: var(--accent);
            border-radius: 2px;
        }

        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg-deep);
            font-weight: 500;
        }

        .btn-primary:hover {
            background: #33ecff;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: var(--accent2);
            color: white;
        }

        .btn-danger:hover {
            background: #ff6b91;
            box-shadow: 0 0 20px rgba(255, 61, 113, 0.4);
        }

        .btn-success {
            background: var(--accent3);
            color: var(--bg-deep);
        }

        .btn-outline {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .btn-outline:hover {
            background: var(--glow);
        }

        /* FORM ELEMENTS */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 10px 14px;
            background: rgba(0, 229, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            transition: all 0.2s;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--accent);
            background: rgba(0, 229, 255, 0.07);
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.08);
        }

        select.form-control option {
            background: var(--bg-mid);
            color: var(--text);
        }

        /* STAT BADGE */
        .stat-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }

        .stat-badge.good { background: rgba(168,255,120,0.12); color: var(--accent3); border: 1px solid rgba(168,255,120,0.2); }
        .stat-badge.bad { background: rgba(255,61,113,0.12); color: var(--accent2); border: 1px solid rgba(255,61,113,0.2); }
        .stat-badge.info { background: rgba(0,229,255,0.1); color: var(--accent); border: 1px solid var(--border); }

        /* ALERT */
        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 20px;
        }

        .alert-error {
            background: rgba(255,61,113,0.1);
            border: 1px solid rgba(255,61,113,0.3);
            color: #ff8fa8;
        }

        /* PAGE TITLE */
        .page-title {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 32px;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .page-subtitle {
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 0.05em;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.2); border-radius: 3px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/dashboard" class="navbar-brand">FRAUD·DETECT</a>
        <ul class="navbar-links">
            <li><a href="/dashboard" {% if request.path == '/dashboard' %}class="active"{% endif %}>Dashboard</a></li>
            <li><a href="/login" {% if request.path == '/login' %}class="active"{% endif %}>Login</a></li>
            <li><a href="/signup" {% if request.path == '/signup' %}class="active"{% endif %}>Signup</a></li>
            <li><a href="/upload" {% if request.path == '/upload' %}class="active"{% endif %}>Upload</a></li>
            <li><a href="/predict_page" {% if request.path == '/predict_page' %}class="active"{% endif %}>Predict</a></li>
            <li><a href="/performance" {% if request.path == '/performance' %}class="active"{% endif %}>Performance</a></li>
            {% if session.user %}
            <li><a href="/logout">Logout</a></li>
            {% endif %}
        </ul>
    </nav>

    {% block content %}{% endblock %}

    {% block scripts %}{% endblock %}
</body>
</html>
